# Tokyo Night Theme (Simplified)
# Extracted from fabioluciano/tmux-tokyo-night

# Colors
%hidden night_bg="#1a1b26"
%hidden night_bg_dark="#16161e"
%hidden night_bg_highlight="#292e42"
%hidden night_fg="#c0caf5"
%hidden night_fg_dark="#a9b1d6"
%hidden night_fg_gutter="#3b4261"
%hidden night_dark3="#545c7e"
%hidden night_dark5="#737aa2"
%hidden night_comment="#565f89"
%hidden night_blue="#7aa2f7"
%hidden night_magenta="#bb9af7"
%hidden night_purple="#9d7cd8"
%hidden night_orange="#ff9e64"
%hidden night_yellow="#e0af68"
%hidden night_green="#9ece6a"
%hidden night_red="#f7768e"
%hidden night_white="#ffffff"

# Basic Styles
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-activity-style "italics"
set -g window-status-bell-style "bold"
set -g message-style "bg=$night_red,fg=$night_bg"
set -g status-style "bg=default,fg=$night_white"

# Border Styles (Customized)
set -g pane-active-border-style "fg=$night_orange"
set -g pane-border-style "fg=$night_bg"

# Pane Border Format (Highlighted title bar)
set -g pane-border-format "#{?pane_active,#[fg=$night_bg]#[bg=$night_blue] [ ###P #T ] ,#[fg=$night_blue]#[bg=default] [ ###P #T ] }"

# Active Pane Visibility (Dim inactive panes)
set -g window-style "fg=$night_comment,bg=$night_bg_dark"
set -g window-active-style "fg=$night_fg_dark,bg=$night_bg"

# Status Left
# Transparent background, dynamic color for prefix
set -g status-left "#[fg=$night_fg_gutter,bold]#{?client_prefix,#[bg=$night_yellow],#[bg=$night_green]} яДЬтЛЕ #S #[bg=default]#{?client_prefix,#[fg=$night_yellow],#[fg=$night_green]}юВ░#[none]"

# Window Status (Inactive)
# Transparent background -> Dark5 (#737aa2) -> Dark3 (#545c7e) -> Default
set -g window-status-format "#[bg=default,fg=$night_dark5]юГЧ#[bg=$night_dark5,fg=$night_bg_highlight] #[fg=$night_white]#I#[bg=$night_dark3,fg=$night_dark5]юВ░#[none]#[fg=$night_white] #{?window_zoomed_flag,юоБ ,юкЕ }#W #[bg=default,fg=$night_dark3]юВ░#[none]"

# Window Status (Active)
# Transparent background -> Magenta (#bb9af7) -> Purple (#9d7cd8) -> Default
set -g window-status-current-format "#[bg=default,fg=$night_magenta]юГЧ#[bg=$night_magenta,fg=$night_bg_highlight] #[fg=$night_white]#I#[bg=$night_purple,fg=$night_magenta]юВ░#[none]#[fg=$night_white] #{?window_zoomed_flag,юоБ ,юкЕ }#W #{?pane_synchronized,тЬ╡,}#[bg=default,fg=$night_purple]юВ░#[none]"

# Status Right (Empty)
set -g status-right ""

# Separator
set -g window-status-separator ""
