# Hyprland config - ported from i3
# https://wiki.hypr.land/Configuring/

################
### MONITORS ###
################

# Laptop display (high DPI ~225 PPI) - scale 1.5x
# Effective resolution: 1920x1280
monitor = eDP-1, 2880x1920@120, 0x0, 1.5

# External monitors (standard DPI) - no scaling
# Position to the right of laptop. Adjust as needed.
monitor = DP-1, preferred, 1920x0, 1
monitor = DP-2, preferred, 1920x0, 1
monitor = HDMI-A-1, preferred, 1920x0, 1
monitor = HDMI-A-2, preferred, 1920x0, 1

# Fallback for any other monitor
monitor = , preferred, auto, 1

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = nautilus
$menu = walker
$browser = firefox
$editor = nvim

################
# ENVS

#################
### AUTOSTART ###
#################

exec-once = uwsm-app -- kanshi
exec-once = uwsm-app -- mako
exec-once = uwsm-app -- waybar
exec-once = uwsm-app -- walker --gapplication-service
exec-once = uwsm-app -- hypridle
exec-once = uwsm-app -- hyprsunset
exec-once = uwsm-app -- swayosd-server
exec-once = uwsm-app -- easyeffects --gapplication-service
exec-once = uwsm-app -- $HOME/.scripts/nudlsieb $HOME/Documents/Wiki/reminders.md

# Wallpaper
exec-once = uwsm-app -- swaybg -i $(fd --full-path ~/Pictures/Backgrounds/ --type=file | shuf -n1) -m fill

# Polkit agent for auth dialogs
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# Slow app launch fix -- set systemd vars
exec-once = systemctl --user import-environment $(env | cut -d'=' -f 1)
exec-once = dbus-update-activation-environment --systemd --all

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# Force all apps to use Wayland
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_STYLE_OVERRIDE,kvantum
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = OZONE_PLATFORM,wayland
env = XDG_SESSION_TYPE,wayland

# Allow better support for screen sharing (Google Meet, Discord, etc)
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland

ecosystem {
  no_update_news = true
}

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1

    # Tokyo Night colors (matching i3 config)
    col.active_border = rgba(bb9af7ff)
    col.inactive_border = rgba(32344aff)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 3
        passes = 1
        vibrancy = 0.1696
    }
}

animations {
    enabled = yes

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

#############
### INPUT ###
#############

input {
    kb_layout = us
    kb_options = caps:swapescape,compose:ralt

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

misc {
    key_press_enables_dpms = true
    mouse_move_enables_dpms = true
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core bindings
bindd = $mainMod, Return, Terminal, exec, $terminal
bindd = $mainMod SHIFT, Q, Kill window, killactive,
bindd = $mainMod, D, App launcher, exec, $menu
bindd = $mainMod, P, Power menu, exec, ~/.scripts/power-menu

# Applications
bindd= $mainMod, X, Todo, exec, $terminal $editor ~/Documents/Wiki/todo.txt
bindd = $mainMod, F, File Manager, exec, $fileManager
bindd = $mainMod, B, Browser, exec, $browser
bindd = $mainMod, N, Neovim, exec, $terminal -e nvim
bindd = $mainMod, T, Top, exec, $terminal -e btop

# Focus movement (vim-style, matching i3)
bindd = $mainMod, H, Focus left, movefocus, l
bindd = $mainMod, J, Focus down, movefocus, d
bindd = $mainMod, K, Focus up, movefocus, u
bindd = $mainMod, L, Focus right, movefocus, r
bindd = $mainMod, Left, Focus left, movefocus, l
bindd = $mainMod, Down, Focus down, movefocus, d
bindd = $mainMod, Up, Focus up, movefocus, u
bindd = $mainMod, Right, Focus right, movefocus, r

# Move windows
bindd = $mainMod SHIFT, Left, Move window left, movewindow, l
bindd = $mainMod SHIFT, Down, Move window down, movewindow, d
bindd = $mainMod SHIFT, Up, Move window up, movewindow, u
bindd = $mainMod SHIFT, Right, Move window right, movewindow, r

# Workspace prev/next on output 
bindd = $mainMod CTRL, H, Previous workspace, workspace, m-1
bindd = $mainMod CTRL, L, Next workspace, workspace, m+1

# Move workspace to monitor
bindd = $mainMod CTRL SHIFT, Left, Move workspace to left monitor, movecurrentworkspacetomonitor, l
bindd = $mainMod CTRL SHIFT, Right, Move workspace to right monitor, movecurrentworkspacetomonitor, r

# Split orientation (dwindle)
bindd = $mainMod, S, Toggle split, togglesplit,
bindd = $mainMod, V, Preselect down, layoutmsg, preselect d

# Fullscreen
bindd = $mainMod SHIFT, F, Fullscreen, fullscreen, 0

# Floating
bindd = $mainMod SHIFT, Space, Toggle floating, togglefloating,
bindd = $mainMod, Space, Cycle floating windows, cyclenext, floating

# Config management
bindd = $mainMod SHIFT, W, Restart Waybar, exec, pkill waybar; uwsm-app -- waybar
bindd = $mainMod SHIFT, R, Reload Hyprland, exec, hyprctl reload

# Lock screen
bindd = $mainMod SHIFT, O, Lock screen, exec, hyprlock

# Screenshot (with satty for annotation)
bindd = , Print, Screenshot region, exec, grim -g "$(slurp)" - | satty -f -
bindd = $mainMod, Print, Screenshot full, exec, grim - | satty -f -
bindd = $mainMod SHIFT, Print, Screenshot region to clipboard, exec, grim -g "$(slurp)" - | wl-copy

# Color picker
bindd = $mainMod SHIFT, P, Color picker, exec, hyprpicker -a

# Switch workspaces
bindd = $mainMod, 1, Workspace 1, workspace, 1
bindd = $mainMod, 2, Workspace 2, workspace, 2
bindd = $mainMod, 3, Workspace 3, workspace, 3
bindd = $mainMod, 4, Workspace 4, workspace, 4
bindd = $mainMod, 5, Workspace 5, workspace, 5
bindd = $mainMod, 6, Workspace 6, workspace, 6
bindd = $mainMod, 7, Workspace 7, workspace, 7
bindd = $mainMod, 8, Workspace 8, workspace, 8
bindd = $mainMod, 9, Workspace 9, workspace, 9
bindd = $mainMod, 0, Workspace 10, workspace, 10

# Move window to workspace
bindd = $mainMod SHIFT, 1, Move to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move to workspace 10, movetoworkspace, 10

# Scroll through workspaces
bindd = $mainMod, mouse_down, Next workspace (scroll), workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace (scroll), workspace, e-1

# Move/resize with mouse
bindmd = $mainMod, mouse:272, Move window (mouse), movewindow
bindmd = $mainMod, mouse:273, Resize window (mouse), resizewindow

# Media keys (using swayosd for visual feedback)
bindeld = , XF86AudioRaiseVolume, Volume up, exec, swayosd-client --output-volume raise
bindeld = , XF86AudioLowerVolume, Volume down, exec, swayosd-client --output-volume lower
bindeld = , XF86AudioMute, Toggle mute, exec, swayosd-client --output-volume mute-toggle
bindeld = , XF86AudioMicMute, Toggle mic mute, exec, swayosd-client --input-volume mute-toggle

# Brightness (using swayosd for visual feedback)
bindeld = , XF86MonBrightnessUp, Brightness up, exec, swayosd-client --brightness raise
bindeld = , XF86MonBrightnessDown, Brightness down, exec, swayosd-client --brightness lower

# Media player controls
bindld = , XF86AudioPlay, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioPause, Play/Pause, exec, playerctl play-pause
bindld = , XF86AudioNext, Next track, exec, playerctl next
bindld = , XF86AudioPrev, Previous track, exec, playerctl previous

# Common Utilities

# Notifications
bindd = SUPER, COMMA, Dismiss last notification, exec, makoctl dismiss
bindd = SUPER SHIFT, COMMA, Dismiss all notifications, exec, makoctl dismiss --all
bindd = SUPER CTRL, COMMA, Toggle silencing notifications, exec, makoctl mode -t do-not-disturb && makoctl mode | grep -q 'do-not-disturb' && notify-send "Silenced notifications" || notify-send "Enabled notifications"
bindd = SUPER ALT, COMMA, Invoke last notification, exec, makoctl invoke
bindd = SUPER SHIFT ALT, COMMA, Restore last notification, exec, makoctl restore

# Speech-to-text
bindd = $mainMod ALT, D, Speech-to-text, exec, /usr/lib/hyprwhspr/config/hyprland/hyprwhspr-tray.sh record

##############################
### SUBMAPS (like i3 modes) ##
##############################

# Exit mode (like i3's "Exit (L)ogout, (R)eboot, (P)oweroff")
bindd = $mainMod SHIFT, E, Exit mode, submap, exit
submap = exit
bindd = $mainMod, L, Logout, exit,
bindd = $mainMod, R, Reboot, exec, systemctl reboot
bindd = $mainMod, P, Poweroff, exec, systemctl poweroff
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Resize mode
bindd = $mainMod, R, Resize mode, submap, resize
submap = resize
binded = , H, Resize left, resizeactive, -20 0
binded = , J, Resize down, resizeactive, 0 20
binded = , K, Resize up, resizeactive, 0 -20
binded = , L, Resize right, resizeactive, 20 0
binded = , Left, Resize left, resizeactive, -20 0
binded = , Down, Resize down, resizeactive, 0 20
binded = , Up, Resize up, resizeactive, 0 -20
binded = , Right, Resize right, resizeactive, 20 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
bind = $mainMod, R, submap, reset
submap = reset

##############################
### WINDOW RULES #############
##############################

# Basics
windowrule = suppress_event maximize, match:class .*

# Fix some dragging issues with XWayland
windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:float 1, match:fullscreen 0, match:pin 0

# Workspace assignments
windowrule = match:class ^([Ff]irefox.*)|([Cc]hromium.*)$, workspace 2
windowrule = match:title ^(Spotify.*)$, workspace 5
windowrule = match:class ^([Ss]lack.*)$, workspace 6
windowrule = match:class ^([Ss]ignal.*)$, workspace 6
windowrule = match:class ^([Dd]iscord.*)$, workspace 6

# Float certain windows
windowrule = match:class ^(org.speedcrunch.speedcrunch)$, float true
windowrule = match:class ^(org.pulseaudio.pavucontrol)$, float true
windowrule = match:class ^(nm-connection-editor)$, float true
windowrule = match:class ^(blueman-manager)$, float true
windowrule = match:title ^(Picture-in-Picture)$, float true


