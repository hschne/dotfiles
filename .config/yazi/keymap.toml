[[mgr.prepend_keymap]]
on   = [ "g", "l" ]
run  = 'shell "lazygit" --block'
desc = "Open lazygit"

[[mgr.prepend_keymap]]
on   = "z"
run  = "plugin fzf"
desc = "Jump to a file/directory via fzf"

[[mgr.prepend_keymap]]
on   = "Z"
run  = "plugin zoxide"
desc = "Jump to a directory via zoxide"

[[mgr.prepend_keymap]]
on   = [ "g", "f" ]
run  = 'search_do --via=fd --args="-d 3"'
desc = "Flat view, max depth 3"

[[mgr.prepend_keymap]]
on   = [ "g", "d" ]
run  = "cd ~/Downloads"
desc = "Go Downloads"

[[mgr.prepend_keymap]]
on   = [ "g", "p" ]
run  = "cd ~/Pictures"
desc = "Go Pictures"

[[mgr.prepend_keymap]]
on   = [ "g", "s" ]
run  = "cd ~/Source"
desc = "Go Source"

[[mgr.prepend_keymap]]
on   = [ "g", "w" ]
run  = "cd ~/Documents/Wiki"
desc = "Go Wiki"

[[mgr.prepend_keymap]]
on   = [ "g", "x" ]
run  = "cd ~/.pi/agent/extensions"
desc = "Go Pi extensions"

[[mgr.prepend_keymap]]
on   = [ "g", "D" ]
run  = "cd ~/Documents"
desc = "Go Documents"
