experimental_monorepo_root = true

[settings]
experimental = true
idiomatic_version_file_enable_tools = ["ruby"]
all_compile = false

[env]
# pi-prompt-template-model expects a pi-subagents runtime root containing agents.ts.
# Pi user packages installed via `pi install npm:*` live under the Pi agent dir,
# independent of the active project Node version.
PI_CODING_AGENT_DIR = "{{ env.HOME }}/.pi/agent"
PI_SUBAGENT_RUNTIME_ROOT = "{{ env.PI_CODING_AGENT_DIR }}/npm/node_modules/pi-subagents/src/agents"

[settings.ruby]
compile = false

[settings.python]
compile = false
precompiled_flavor = "install_only"

[settings.npm]
package_manager = "npm"

[tools]
node = "lts"
ruby = "latest"
golang = 'latest'
python = 'latest'

# Others
fnox = "latest"
hk = "latest"
shellcheck = "latest"
usage = "latest"

# NPM Tools
"npm:@devcontainers/cli" = "latest"
"npm:@earendil-works/pi-coding-agent" = "latest"
"npm:@tobilu/qmd" = "latest"
"npm:pnpm" = "latest"

# LSP & Lint
"npm:@herb-tools/formatter" = "latest"
"npm:@herb-tools/language-server" = "latest" 
"npm:@stylelint/language-server" = "latest"
"npm:@tailwindcss/language-server" = "latest"
"npm:prettier" = "latest"
"npm:stimulus-language-server" = "latest"
"npm:svelte-language-server" = "latest"
"npm:typescript-language-server" = "latest"
"npm:yaml-language-server" = "latest"
