# Tokyo Night Theme (Simplified)
# Extracted from fabioluciano/tmux-tokyo-night

# Colors
%hidden night_bg="#1a1b26"
%hidden night_bg_dark="#16161e"
%hidden night_bg_highlight="#292e42"
%hidden night_fg="#c0caf5"
%hidden night_fg_dark="#a9b1d6"
%hidden night_fg_gutter="#3b4261"
%hidden night_dark3="#545c7e"
%hidden night_dark5="#737aa2"
%hidden night_comment="#565f89"
%hidden night_blue="#7aa2f7"
%hidden night_magenta="#bb9af7"
%hidden night_purple="#9d7cd8"
%hidden night_orange="#ff9e64"
%hidden night_yellow="#e0af68"
%hidden night_green="#9ece6a"
%hidden night_red="#f7768e"
%hidden night_white="#ffffff"

# Basic Styles
set -g status-left-length 100
set -g status-right-length 100
set -g window-status-activity-style "italics"
set -g window-status-bell-style "bold"
set -g message-style "bg=$night_red,fg=$night_bg"
set -g status-style "bg=default,fg=$night_white"

# Border Styles (Customized)
set -g pane-active-border-style "fg=$night_orange"
set -g pane-border-style "fg=$night_bg"

# Pane Border Format (Highlighted title bar)
# Prefer @pi_title (set by pi extension) over pane_title
set -g pane-border-format "#{?pane_active,#[fg=$night_bg]#[bg=$night_blue] [ ###P #{?#{@pi_title},#{@pi_title},#T} ] ,#[fg=$night_blue]#[bg=default] [ ###P #{?#{@pi_title},#{@pi_title},#T} ] }"

# Active Pane Visibility (Dim inactive panes)
set -g window-style "fg=$night_comment,bg=$night_bg_dark"
set -g window-active-style "fg=$night_fg_dark,bg=$night_bg"

# Status Left
# Transparent background, dynamic color for prefix
set -g status-left "#[fg=$night_fg_gutter,bold]#{?client_prefix,#[bg=$night_yellow],#[bg=$night_green]} ⋅ #S #[bg=default]#{?client_prefix,#[fg=$night_yellow],#[fg=$night_green]}#[none]"

# mux-solo: per-pane process/agent status in the window list, via the
# plugin (https://github.com/hschne/mux-solo). It exposes @mux_solo_name
# (pane status concat, or #W) and @mux_solo_attention (crash/wait tint).
# Colours are mapped to the Tokyo Night palette here.
set -g @mux-solo-color-running "$night_green"
set -g @mux-solo-color-working "$night_green"
set -g @mux-solo-color-waiting "$night_blue"
set -g @mux-solo-color-crashed "$night_red"
set -g @mux-solo-color-exited  "$night_green"
set -g @mux-solo-color-label   "$night_white"
%hidden mux_name="#{?window_zoomed_flag, , }#{E:@mux_solo_name}"
%hidden mux_accent_inactive="#{?#{E:@mux_solo_attention},#{E:@mux_solo_attention},$night_dark5}"

# Window Status (Inactive)
# Transparent background -> Dark5 (#737aa2) -> Dark3 (#545c7e) -> Default
set -g window-status-format "#[bg=default,fg=$mux_accent_inactive]#[bg=$mux_accent_inactive,fg=$night_bg_highlight] #[fg=$night_white]#I#[bg=$night_dark3,fg=$mux_accent_inactive]#[bg=$night_dark3,fg=$night_white] $mux_name #[bg=default,fg=$night_dark3]#[none]"

# Window Status (Active)
# Transparent background -> Magenta (#bb9af7) -> Purple (#9d7cd8) -> Default
set -g window-status-current-format "#[bg=default,fg=$night_magenta]#[bg=$night_magenta,fg=$night_bg_highlight] #[fg=$night_white]#I#[bg=$night_purple,fg=$night_magenta]#[bg=$night_purple,fg=$night_white] $mux_name #{?pane_synchronized,✵,}#[bg=default,fg=$night_purple]#[none]"

# Status Right (Empty)
set -g status-right ""

# Separator
set -g window-status-separator ""
